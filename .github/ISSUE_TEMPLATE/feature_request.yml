name: Feature Request
description: Suggest a new feature or enhancement
labels: [enhancement]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature would you like to see? Why?
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Example usage
      description: Show how you'd use the feature.
      render: python
